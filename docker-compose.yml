version: '3.8'

services:

  zookeeper:
    image: zookeeper:3.4.14
    container_name: hbase-zookeeper
    ports:
      - "2181:2181"

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hbase-namenode
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    ports:
      - "9870:9870"

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hbase-datanode
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      - SERVICE_PRECONDITION=hbase-namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020

  hbase-master:
    image: harisekhon/hbase:2.1
    container_name: hbase-master
    depends_on:
      - zookeeper
      - namenode
    ports:
      - "16010:16010" # HBase Web UI
      - "16000:16000" # HBase Master port
    command: master
    environment:
      - HBASE_CONFIG_hbase_cluster_distributed=true
      - HBASE_CONFIG_hbase_zookeeper_quorum=zookeeper:2181
      - HBASE_CONFIG_hbase_rootdir=hdfs://namenode:8020/hbase

  hbase-regionserver:
    image: harisekhon/hbase:2.1
    container_name: hbase-regionserver
    depends_on:
      - hbase-master
    command: regionserver
    environment:
      - HBASE_CONFIG_hbase_cluster_distributed=true
      - HBASE_CONFIG_hbase_zookeeper_quorum=zookeeper:2181
      - HBASE_CONFIG_hbase_rootdir=hdfs://namenode:8020/hbase

volumes:
  hadoop_namenode:
  hadoop_datanode:
